name: "Semantic commit linter"

on:
  workflow_call:

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6.0.1
        with:
          fetch-depth: '0'
      - name: Commitsar check
        uses: aevea/commitsar@v1.0.2
