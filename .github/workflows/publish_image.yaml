name: Publish Image

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
      tags:
        required: true
        type: string
      image_name:
        required: false
        type: string
        default: ${{ github.repository }}
      pull_submodules:
        required: false
        type: boolean
        default: false
    secrets:
      token:
        required: true

jobs:

  ImagePublisher:
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: ${{ inputs.pull_submodules }}
          token: ${{ secrets.token }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Create image name list
        run: |
          IMAGE_NAMES=$(echo "${{ inputs.tags }}" | while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then # Check if $tag is not empty
              echo "ghcr.io/${{ inputs.image_name }}:$tag"
            fi
          done)
          echo "IMAGE_NAMES<<EOF" >> $GITHUB_ENV
          echo "$IMAGE_NAMES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Image list
        run: |
          echo "IMAGE_NAMES=${{ env.IMAGE_NAMES }}"

      - name: Build and push
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: "${{ env.IMAGE_NAMES }}"
